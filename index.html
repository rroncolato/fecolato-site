<html lang="pt-BR" data-theme="light">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://api.notion.com">
  <link rel="dns-prefetch" href="https://s3.us-west-2.amazonaws.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <title>Fecolato Doces — Catálogo</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens Light ── */
:root {
  --bg:      #F7F1EA;
  --surface: #FFFFFF;
  --text:    #3A2218;
  --muted:   rgba(58,34,24,0.60);
  --primary: #B56A3B;
  --accent:  #6F6A3C;
  --blush:   #EAD6CF;
  --r-card:  18px;
  --r-btn:   50px;
  --r-chip:  50px;
  --r-modal: 22px;
  --r-input: 14px;
  --sh-card:  0 2px 16px rgba(58,34,24,0.09), 0 1px 4px rgba(58,34,24,0.06);
  --sh-modal: 0 24px 64px rgba(58,34,24,0.22), 0 4px 16px rgba(58,34,24,0.10);
  --sh-btn:   0 4px 18px rgba(181,106,59,0.28);
  --fd: 'Cormorant Garamond', Georgia, serif;
  --fu: 'DM Sans', system-ui, -apple-system, sans-serif;
  --t: 0.25s cubic-bezier(0.4,0,0.2,1);
  --ts: 0.4s cubic-bezier(0.4,0,0.2,1);
}
/* ── Tokens Dark ── */
[data-theme="dark"] {
  --bg:#12100E; --surface:#1C1815; --text:#F4EEE7;
  --muted:rgba(244,238,231,0.65); --primary:#C8784A; --accent:#8A855A; --blush:#2A231F;
  --sh-card: 0 2px 16px rgba(0,0,0,0.35),0 1px 4px rgba(0,0,0,0.25);
  --sh-modal:0 24px 64px rgba(0,0,0,0.55),0 4px 16px rgba(0,0,0,0.35);
}

/* ── Base ── */
html { font-size:16px; -webkit-text-size-adjust:100%; }
body {
  font-family:var(--fu); background:var(--bg); color:var(--text);
  min-height:100dvh; overflow-x:hidden;
  transition:background var(--ts), color var(--ts);
  -webkit-font-smoothing:antialiased;
}
img { display:block; max-width:100%; }
button { cursor:pointer; border:none; background:none; font-family:var(--fu); }
a { text-decoration:none; }

/* ── Header ── */
.site-header {
  position:sticky; top:0; z-index:100; height:124px;
  background:var(--bg); border-bottom:1px solid rgba(181,106,59,0.12);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  display:flex; align-items:center; padding:0 20px;
  transition:background var(--ts);
}
.header-inner {
  width:100%; max-width:1100px; margin:0 auto;
  display:grid; grid-template-columns:40px 1fr 40px; align-items:center;
}
.header-inner > a {
  grid-column:2; justify-self:center;
}
.header-inner > button {
  grid-column:3; justify-self:end;
}
/* Logo imagem */
.brand-logo {
  height: 100px;
  width: auto;
  object-fit: contain;
  /* No tema claro a logo já tem as cores corretas.
     No dark mode, clareia levemente para contrastar com o fundo escuro */
  transition: filter var(--ts);
}
[data-theme="dark"] .brand-logo {
  filter: brightness(1.35) contrast(0.95);
}

/* ── Theme Toggle ── */
.theme-toggle {
  width:36px; height:36px; border-radius:8px; background:transparent;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:background var(--t), color var(--t);
  color:var(--muted);
}
.theme-toggle:hover { background:var(--blush); color:var(--primary); }
.theme-toggle svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
[data-theme="light"] .icon-moon { display:none; }
[data-theme="dark"]  .icon-sun  { display:none; }

/* ── Main ── */
.main-content {
  max-width:1100px; margin:0 auto; padding:28px 16px 120px;
  animation:page-in .5s ease both;
}
@keyframes page-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* ── Search ── */
.search-wrapper { position:relative; margin-bottom:20px; }
.search-icon {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  color:var(--muted); pointer-events:none;
}
.search-input {
  width:100%; height:50px; background:var(--surface);
  border:1.5px solid rgba(181,106,59,0.15); border-radius:var(--r-input);
  padding:0 16px 0 44px; font-family:var(--fu); font-size:0.95rem; color:var(--text);
  outline:none; box-shadow:var(--sh-card);
  transition:border-color var(--t), box-shadow var(--t);
}
.search-input::placeholder { color:var(--muted); }
.search-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(181,106,59,0.12),var(--sh-card); }

/* ── Chips ── */
.chips-row {
  display:flex; gap:8px; margin-bottom:22px; flex-wrap:nowrap;
  overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; padding-bottom:4px;
}
.chips-row::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; height:36px; padding:0 18px; border-radius:var(--r-chip);
  border:1.5px solid rgba(181,106,59,0.2); background:var(--surface);
  color:var(--muted); font-size:0.82rem; font-weight:500; letter-spacing:0.03em;
  white-space:nowrap; transition:all var(--t);
}
.chip:hover { border-color:var(--primary); color:var(--primary); background:rgba(181,106,59,0.06); }
.chip.active { background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:var(--sh-btn); }

/* ── Divider ── */
.section-divider { display:flex; align-items:center; gap:12px; margin-bottom:20px; color:var(--muted); }
.section-divider::before,.section-divider::after {
  content:''; flex:1; height:1px;
  background:linear-gradient(to right,transparent,rgba(181,106,59,0.2),transparent);
}

/* ── Count ── */
.results-count { font-size:0.78rem; color:var(--muted); margin-bottom:18px; letter-spacing:0.04em; text-transform:uppercase; font-weight:500; }

/* ── Grid ── */
.product-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }

/* ── Card ── */
.product-card {
  background:var(--surface); border-radius:var(--r-card); overflow:hidden;
  box-shadow:var(--sh-card); cursor:pointer; position:relative;
  display:flex; flex-direction:column;
  border:1px solid rgba(181,106,59,0.06);
  transition:transform var(--t), box-shadow var(--t);
}
.product-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(58,34,24,0.14),0 4px 12px rgba(58,34,24,0.08); }
.product-card:active { transform:translateY(-1px); }

.card-badge {
  position:absolute; top:10px; left:10px; padding:3px 10px; border-radius:50px;
  font-size:0.65rem; font-weight:500; letter-spacing:0.06em; text-transform:uppercase;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:2;
}
.card-badge.pudim      { background:rgba(181,106,59,0.85); color:#fff; }
.card-badge.brigadeiro { background:rgba(111,106,60,0.85); color:#fff; }
.card-badge.zero-acucar  { background:rgba(72,130,85,0.85);  color:#fff; }
.card-badge.bolo-no-pote { background:rgba(180,90,120,0.85); color:#fff; }
/* ── NOVA CATEGORIA — checklist completo (faça os 4 passos):
   1. EMOJI  → adicione em const EMOJI: NomeExato:"🔴"
   2. BADGE  → .card-badge.nome-da-classe { background:rgba(R,G,B,0.85); color:#fff; }   ← aqui
   3. TAG    → .modal-cat.nome-da-classe  { background:rgba(R,G,B,0.12); color:#HEX; }   ← em .modal-cat
   Obs: nome da classe = categoria em minúsculas, sem acentos, espaços viram hífens ── */

.card-photo {
  width:100%; aspect-ratio:1/1; object-fit:cover; background:var(--blush); flex-shrink:0;
  transition:transform .45s cubic-bezier(0.4,0,0.2,1);
}
.product-card:hover .card-photo { transform:scale(1.04); }
.card-photo-placeholder {
  width:100%; aspect-ratio:1/1; flex-shrink:0;
  background:linear-gradient(135deg,var(--blush) 0%,rgba(181,106,59,0.15) 100%);
  display:flex; align-items:center; justify-content:center; font-size:2.8rem;
}
.card-body { padding:14px 14px 16px; display:flex; flex-direction:column; gap:6px; flex:1; }
.card-name { font-family:var(--fd); font-size:1rem; font-weight:600; color:var(--text); line-height:1.25; }
.card-desc {
  font-size:0.75rem; color:var(--muted); line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}

/* ── Empty ── */
.empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }
.empty-state .ei { font-size:3rem; margin-bottom:16px; display:block; }
.empty-state p { font-family:var(--fd); font-size:1.1rem; font-style:italic; }

/* ── Skeleton ── */
.loading-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
.skeleton { background:var(--surface); border-radius:var(--r-card); overflow:hidden; box-shadow:var(--sh-card); }
.sk-photo { width:100%; aspect-ratio:1/1; background:linear-gradient(90deg,var(--blush) 25%,rgba(181,106,59,0.08) 50%,var(--blush) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
.sk-body { padding:14px; display:flex; flex-direction:column; gap:8px; }
.sk-line { height:12px; border-radius:6px; background:linear-gradient(90deg,var(--blush) 25%,rgba(181,106,59,0.08) 50%,var(--blush) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
.sk-line.s { width:60%; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(18,14,10,0.65);
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  z-index:200; display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity var(--ts);
}
@media(min-width:600px){ .modal-overlay{ align-items:center; } }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-box {
  background:var(--surface); width:100%; max-width:480px;
  border-radius:var(--r-modal) var(--r-modal) 0 0; overflow:hidden;
  box-shadow:var(--sh-modal); transform:translateY(40px);
  transition:transform var(--ts); max-height:92dvh; display:flex; flex-direction:column;
}
@media(min-width:600px){ .modal-box{ border-radius:var(--r-modal); transform:scale(0.94) translateY(20px); max-height:88vh; } }
.modal-overlay.open .modal-box { transform:translateY(0); }
@media(min-width:600px){ .modal-overlay.open .modal-box { transform:scale(1) translateY(0); } }

.modal-drag { width:38px; height:4px; background:rgba(181,106,59,0.25); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
@media(min-width:600px){ .modal-drag{ display:none; } }

.modal-photo-wrap { width:100%; aspect-ratio:4/3; overflow:hidden; position:relative; flex-shrink:0; }
.modal-photo { width:100%; height:100%; object-fit:cover; display:block; }
.modal-photo-ph {
  width:100%; height:100%;
  background:linear-gradient(135deg,var(--blush) 0%,rgba(181,106,59,0.18) 100%);
  display:flex; align-items:center; justify-content:center; font-size:4.5rem;
}
.modal-close {
  position:absolute; top:14px; right:14px; width:36px; height:36px; border-radius:50%;
  background:rgba(18,16,14,0.5); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  color:#fff; font-size:1rem; display:flex; align-items:center; justify-content:center;
  transition:background var(--t),transform var(--t); z-index:2; cursor:pointer; border:none;
}
.modal-close:hover { background:rgba(18,16,14,0.75); transform:scale(1.1); }

.modal-content { padding:22px 22px 28px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
.modal-cat {
  display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:50px;
  font-size:0.72rem; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; align-self:flex-start;
}
.modal-cat.pudim      { background:rgba(181,106,59,0.12); color:var(--primary); }
.modal-cat.brigadeiro { background:rgba(111,106,60,0.12); color:var(--accent); }
.modal-cat.zero-acucar  { background:rgba(72,130,85,0.12);  color:#487A55; }
.modal-cat.bolo-no-pote { background:rgba(180,90,120,0.12); color:#B45A78; }
/* ── NOVA CATEGORIA — checklist completo (faça os 4 passos):
   1. EMOJI  → adicione em const EMOJI: NomeExato:"🔴"
   2. BADGE  → .card-badge.nome-da-classe { background:rgba(R,G,B,0.85); color:#fff; }   ← em .card-badge
   3. TAG    → .modal-cat.nome-da-classe  { background:rgba(R,G,B,0.12); color:#HEX; }   ← aqui
   Obs: nome da classe = categoria em minúsculas, sem acentos, espaços viram hífens ── */
.modal-title { font-family:var(--fd); font-size:clamp(1.4rem,5vw,1.75rem); font-weight:600; color:var(--text); line-height:1.2; }
.modal-desc  { font-size:0.9rem; color:var(--muted); line-height:1.7; }

/* ── WA Button ── */
.btn-wa {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; height:52px; border-radius:var(--r-btn);
  background:#25D366; color:#fff; font-family:var(--fu);
  font-size:0.92rem; font-weight:500; letter-spacing:0.02em; margin-top:6px;
  box-shadow:0 4px 20px rgba(37,211,102,0.35);
  transition:transform var(--t),box-shadow var(--t),background var(--t);
}
.btn-wa:hover { background:#1ebe5d; transform:translateY(-2px); box-shadow:0 8px 28px rgba(37,211,102,0.45); }
.btn-wa:active { transform:none; }

/* ── SVG Icon (tamanho fixo — corrige o bug) ── */
.wa-svg { width:22px; height:22px; flex-shrink:0; display:block; fill:white; }

/* ── FAB ── */
.fab {
  position:fixed; bottom:26px; right:20px; z-index:150;
  width:58px; height:58px; border-radius:50%; background:#25D366;
  box-shadow:0 6px 24px rgba(37,211,102,0.45),0 2px 8px rgba(0,0,0,0.12);
  display:flex; align-items:center; justify-content:center;
  transition:transform var(--t),box-shadow var(--t);
}
.fab:hover { transform:scale(1.1) translateY(-2px); box-shadow:0 10px 32px rgba(37,211,102,0.55); }
.fab::before {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  background:rgba(37,211,102,0.3); animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.22);opacity:0} }

/* ── Responsive ── */
@media(min-width:540px) {
  .main-content { padding:32px 24px 120px; }
  .product-grid, .loading-grid { grid-template-columns:repeat(3,1fr); gap:18px; }
}
@media(min-width:900px) {
  .main-content { padding:40px 32px 120px; }
  .product-grid, .loading-grid { grid-template-columns:repeat(4,1fr); gap:22px; }
}
:focus-visible { outline:2px solid var(--primary); outline-offset:3px; border-radius:4px; }
</style>
</head>

<!-- MODAL -->

<script>
/* ════════════════════════════════════════════════
   FECOLATO DOCES — app.js
   Lê catálogo do Notion Database em tempo real.
   Fallback automático para dados embutidos se a
   API não estiver acessível (ex: abrir local).
   ════════════════════════════════════════════════ */


/* ── Dados de fallback (usados se API falhar) ── */
const FALLBACK = [
  {id:1,  name:"Pudim Clássico de Leite",               category:"Pudim",      shortDescription:"Receita tradicional de família, com calda de caramelo dourado e textura aveludada que derrete na boca."},
  {id:2,  name:"Pudim de Coco com Calda de Maracujá",   category:"Pudim",      shortDescription:"Combinação tropical irresistível: coco fresco ralado com calda agridoce de maracujá."},
  {id:3,  name:"Pudim de Doce de Leite",                category:"Pudim",      shortDescription:"Doce de leite artesanal incorporado à massa, com sabor profundo e caramelado."},
  {id:4,  name:"Pudim de Chocolate Belga",              category:"Pudim",      shortDescription:"Feito com chocolate 70% cacau, para quem aprecia o lado mais intenso e sofisticado dos doces."},
  {id:5,  name:"Pudim de Baunilha com Frutas Vermelhas",category:"Pudim",      shortDescription:"Base suave de baunilha com calda de frutas vermelhas frescas, elegante e perfumado."},
  {id:6,  name:"Brigadeiro Tradicional",                category:"Brigadeiro", shortDescription:"O clássico que nunca sai de moda: chocolate, leite condensado e granulado belga em ponto perfeito."},
  {id:7,  name:"Brigadeiro de Pistache",                category:"Brigadeiro", shortDescription:"Recheio cremoso de pasta de pistache puro, envolvido em granulado crocante. Sofisticado e único."},
  {id:8,  name:"Brigadeiro de Maracujá",                category:"Brigadeiro", shortDescription:"Acidez equilibrada do maracujá com a doçura do leite condensado, coberto com açúcar cristal."},
  {id:9,  name:"Brigadeiro Belga com Flor de Sal",      category:"Brigadeiro", shortDescription:"Chocolate belga 60% com toque de flor de sal artesanal. O contraste que eleva cada mordida."},
  {id:10, name:"Brigadeiro de Especiarias",             category:"Brigadeiro", shortDescription:"Blend exclusivo com canela, cravo e cardamomo. Uma experiência aromática e calorosa."},
];

const WA    = "556285338606";
// NOVA CATEGORIA — checklist completo (faça os 4 passos):
// 1. EMOJI  → adicione aqui: NomeExato:"🔴"  (nome igual ao Notion)
// 2. BADGE  → .card-badge.nome-da-classe { background:rgba(R,G,B,0.85); color:#fff; }
// 3. TAG    → .modal-cat.nome-da-classe  { background:rgba(R,G,B,0.12); color:#HEX; }
// Obs: nome da classe = categoria em minúsculas, sem acentos, espaços viram hífens
const EMOJI = { Pudim:"🍮", Brigadeiro:"🍫", "Zero Açúcar":"🌿", "Bolo no Pote":"🍰" };

const state = {
  catalog: [],
  filtered: [],
  activeCategory: "Todos",
  searchTerm: "",
  theme: localStorage.getItem("fecolato-theme") || "light",
};

const $ = id => document.getElementById(id);

/* ════ TEMA ════ */
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  state.theme = t;
  localStorage.setItem("fecolato-theme", t);
}
$("theme-toggle").addEventListener("click", () =>
  applyTheme(state.theme === "dark" ? "light" : "dark")
);

/* ════ NOTION API ════ */
async function fetchNotion() {
  // Chama o proxy PHP local (evita CORS da API do Notion)
  const res = await fetch("notion-proxy.php");
  if (!res.ok) throw new Error(`Proxy: ${res.status}`);
  const data = await res.json();
  return data.results.map((page, i) => {
    const p = page.properties;
    // Nome
    const name = p["Nome"]?.title?.[0]?.plain_text || "";
    // Categoria
    const category = p["Categoria"]?.select?.name || "";
    // Descrição
    const shortDescription = p["Descrição"]?.rich_text?.[0]?.plain_text || "";
    // Foto — pega a primeira URL do campo Files
    const files = p["Foto"]?.files || [];
    let photo = "";
    if (files.length > 0) {
      photo = files[0]?.file?.url || files[0]?.external?.url || "";
    }
    return { id: page.id, name, category, shortDescription, photo };
  });
}

/* ════ CHIPS ════ */
function buildChips() {
  const cats = ["Todos", ...new Set(state.catalog.map(p => p.category).filter(Boolean))];
  $("chips-row").innerHTML = cats.map(c =>
    `<button class="chip${c === state.activeCategory ? " active" : ""}" data-cat="${c}">${c}</button>`
  ).join("");
  $("chips-row").querySelectorAll(".chip").forEach(btn =>
    btn.addEventListener("click", () => {
      state.activeCategory = btn.dataset.cat;
      $("chips-row").querySelectorAll(".chip").forEach(b => b.classList.toggle("active", b === btn));
      applyFilters();
    })
  );
}

/* ════ FILTROS ════ */
function applyFilters() {
  const term = state.searchTerm.toLowerCase().trim();
  state.filtered = state.catalog.filter(p => {
    const mc = state.activeCategory === "Todos" || p.category === state.activeCategory;
    const ms = !term || p.name.toLowerCase().includes(term) || p.shortDescription.toLowerCase().includes(term);
    return mc && ms;
  });
  render();
}

/* ════ ESCAPE ════ */
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ════ SKELETONS ════ */
function showSkeletons() {
  $("product-grid").className = "loading-grid";
  $("product-grid").innerHTML = Array(6).fill(`
    <div class="skeleton">
      <div class="sk-photo"></div>
      <div class="sk-body"><div class="sk-line"></div><div class="sk-line s"></div></div>
    </div>`).join("");
}

/* ════ RENDER ════ */
function render() {
  const grid = $("product-grid");
  grid.className = "product-grid";
  const n = state.filtered.length;
  $("results-count").textContent = n === 0
    ? "Nenhum produto encontrado"
    : `Mostrando ${n} ${n === 1 ? "produto" : "produtos"}`;

  if (n === 0) {
    grid.innerHTML = `<div class="empty-state"><span class="ei">🔍</span><p>Nenhum resultado para "<em>${esc(state.searchTerm)}</em>"</p></div>`;
    return;
  }

  grid.innerHTML = state.filtered.map(p => {
    const em = EMOJI[p.category] || "🍬";
    const bc = (p.category || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"-");
    const photo = p.photo
      ? `<img class="card-photo" src="${esc(p.photo)}" alt="${esc(p.name)}" loading="lazy"
             onerror="this.outerHTML='<div class=\'card-photo-placeholder\'>${em}</div>'">`
      : `<div class="card-photo-placeholder">${em}</div>`;
    return `
      <article class="product-card" data-id="${esc(String(p.id))}" tabindex="0" role="button" aria-label="Ver ${esc(p.name)}">
        <span class="card-badge ${bc}">${esc(p.category)}</span>
        ${photo}
        <div class="card-body">
          <h2 class="card-name">${esc(p.name)}</h2>
          <p class="card-desc">${esc(p.shortDescription)}</p>
        </div>
      </article>`;
  }).join("");

  grid.querySelectorAll(".product-card").forEach(card => {
    const open = () => openModal(card.dataset.id);
    card.addEventListener("click", open);
    card.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
    });
  });
}

/* ════ MODAL ════ */
function openModal(id) {
  const p = state.catalog.find(x => String(x.id) === String(id));
  if (!p) return;
  const em  = EMOJI[p.category] || "🍬";
  const cls = (p.category || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"-");

  const photoHTML = p.photo
    ? `<img class="modal-photo" src="${esc(p.photo)}" alt="${esc(p.name)}"
           onerror="this.outerHTML='<div class=\'modal-photo-ph\'>${em}</div>'">`
    : `<div class="modal-photo-ph">${em}</div>`;

  $("modal-photo").innerHTML = `${photoHTML}<button class="modal-close" aria-label="Fechar">✕</button>`;
  $("modal-photo").querySelector(".modal-close").addEventListener("click", closeModal);

  $("modal-category").textContent = `${em} ${p.category}`;
  $("modal-category").className   = `modal-cat ${cls}`;
  $("modal-title").textContent    = p.name;
  $("modal-desc").textContent     = p.shortDescription;

  const msg = `Oi, Fecolato Doces! Gostaria de pedir: ${p.name} ${em}. Pode me informar disponibilidade?`;
  $("modal-wa-btn").href = `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;

  $("modal-overlay").classList.add("open");
  $("modal-overlay").setAttribute("aria-hidden","false");
  document.body.style.overflow = "hidden";
  setTimeout(() => $("modal-photo").querySelector(".modal-close").focus(), 50);
}

function closeModal() {
  $("modal-overlay").classList.remove("open");
  $("modal-overlay").setAttribute("aria-hidden","true");
  document.body.style.overflow = "";
}

$("modal-overlay").addEventListener("click", e => {
  if (e.target === $("modal-overlay")) closeModal();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

/* ════ BUSCA ════ */
let _t;
$("search-input").addEventListener("input", e => {
  clearTimeout(_t);
  _t = setTimeout(() => { state.searchTerm = e.target.value; applyFilters(); }, 220);
});

/* ════ INIT ════ */
async function init() {
  applyTheme(state.theme);
  showSkeletons();

  try {
    state.catalog = await fetchNotion();
    console.log(`✅ Notion: ${state.catalog.length} produtos carregados`);
  } catch (err) {
    console.warn("⚠️ Notion indisponível, usando fallback:", err.message);
    state.catalog = FALLBACK;
  }

  state.filtered = [...state.catalog];
  buildChips();
  render();
}

init();
</script>
